<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitarbeiter Task System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22222f;
--border:#2a2a3a;--border-light:#3a3a4f;
--text:#e8e8f0;--text-muted:#8888a0;
--accent:#4f8cff;--accent-glow:#4f8cff33;--accent-soft:#4f8cff18;
--green:#22c55e;--green-glow:#22c55e33;--green-soft:#22c55e15;
--red:#ef4444;--red-glow:#ef444433;--red-soft:#ef444418;
--orange:#f59e0b;--orange-soft:#f59e0b18;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar .logo{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;letter-spacing:1px;color:var(--accent);display:flex;align-items:center;gap:8px}
.topbar .logo span{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green-glow);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-muted)}
.topbar .role-badge{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(79,140,255,.2)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-nav{padding:16px 12px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:16px 12px 8px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(79,140,255,.13)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:32px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page-header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-subtitle{font-size:13px;color:var(--text-muted)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.stat-card .value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700}
.stat-card .value.green{color:var(--green)}.stat-card .value.red{color:var(--red)}.stat-card .value.accent{color:var(--accent)}.stat-card .value.orange{color:var(--orange)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--surface3);border-color:var(--border-light)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.15);box-shadow:0 0 20px var(--accent-glow)}
.btn.danger{background:var(--red-soft);border-color:rgba(239,68,68,.27);color:var(--red)}
.btn.danger:hover{background:rgba(239,68,68,.13)}
.btn.success{background:var(--green-soft);border-color:rgba(34,197,94,.27);color:var(--green)}
.btn.sm{padding:5px 10px;font-size:12px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(42,42,58,.53)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,26,38,.53)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.badge.open{background:var(--orange-soft);color:var(--orange)}
.badge.done{background:var(--green-soft);color:var(--green)}
.badge.overdue{background:var(--red-soft);color:var(--red)}
.badge.deducted{background:var(--red-soft);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.53);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:440px;max-width:90vw;max-height:80vh;overflow-y:auto;transform:translateY(10px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px;transition:all .15s}
.task-card:hover{border-color:var(--border-light)}
.task-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--border-light);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.task-check:hover{border-color:var(--accent);background:var(--accent-soft)}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-check.checked svg{display:block}
.task-check svg{display:none;width:16px;height:16px;color:#fff}
.task-info{flex:1}
.task-title{font-weight:600;font-size:15px;margin-bottom:4px}
.task-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.task-penalty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--red);font-weight:600}
.task-card.completed{opacity:.45}.task-card.completed .task-title{text-decoration:line-through}
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;text-align:center}
.login-box .logo-big{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:2px}
.login-box .login-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px}
.login-box .form-group{text-align:left;margin-bottom:14px}
.login-box .btn{width:100%;justify-content:center;margin-top:8px}
.hidden{display:none!important}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid rgba(34,197,94,.27);color:var(--green);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:rgba(239,68,68,.27);color:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text-muted);font-size:13px}
select option{background:var(--surface);color:var(--text)}
@media(max-width:768px){.sidebar{display:none}.content{padding:20px}.stats-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="app"><div class="loading">Laden...</div></div>
<div class="toast" id="toast"></div>

<script>
// ─── API HELPER ───
const API = {
  token: localStorage.getItem('auth_token'),
  user: JSON.parse(localStorage.getItem('auth_user') || 'null'),

  async request(method, url, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (this.token) opts.headers['X-Auth-Token'] = this.token;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Fehler');
    return data;
  },

  setAuth(token, user) {
    this.token = token;
    this.user = user;
    localStorage.setItem('auth_token', token);
    localStorage.setItem('auth_user', JSON.stringify(user));
  },

  clearAuth() {
    this.token = null;
    this.user = null;
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_user');
  },

  get: (url) => API.request('GET', url),
  post: (url, body) => API.request('POST', url, body),
  put: (url, body) => API.request('PUT', url, body),
  del: (url) => API.request('DELETE', url),
};

// ─── STATE ───
let state = {
  view: API.user ? (API.user.role === 'admin' ? 'admin' : 'employee') : 'login',
  adminTab: 'dashboard',
  modal: null,
  employees: [],
  tasks: [],
  deductions: [],
  stats: {},
  myStats: {},
};

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ─── DATA LOADING ───
async function loadAdminData() {
  try {
    const [employees, tasks, deductions, stats] = await Promise.all([
      API.get('/api/employees'),
      API.get('/api/tasks'),
      API.get('/api/deductions'),
      API.get('/api/stats'),
    ]);
    state.employees = employees;
    state.tasks = tasks;
    state.deductions = deductions;
    state.stats = stats;
  } catch (e) {
    if (e.message === 'Nicht autorisiert') { API.clearAuth(); state.view = 'login'; }
    else toast(e.message, true);
  }
}

async function loadEmployeeData() {
  try {
    const [tasks, deductions, myStats] = await Promise.all([
      API.get('/api/tasks'),
      API.get('/api/deductions'),
      API.get('/api/my-stats'),
    ]);
    state.tasks = tasks;
    state.deductions = deductions;
    state.myStats = myStats;
  } catch (e) {
    if (e.message === 'Nicht autorisiert') { API.clearAuth(); state.view = 'login'; }
    else toast(e.message, true);
  }
}

// ─── RENDER ───
async function render() {
  const app = document.getElementById('app');
  if (state.view === 'login') { app.innerHTML = renderLogin(); bindEvents(); return; }
  if (state.view === 'admin') { await loadAdminData(); app.innerHTML = renderAdmin(); }
  if (state.view === 'employee') { await loadEmployeeData(); app.innerHTML = renderEmployee(); }
  bindEvents();
}

// ─── LOGIN ───
function renderLogin() {
  return `<div class="login-screen">
    <div class="login-box">
      <div class="logo-big">◆ TASK SYSTEM</div>
      <div class="login-sub">Mitarbeiter Management & Aufgabenverwaltung</div>
      <div class="form-group">
        <label>Anmeldung</label>
        <select id="loginType">
          <option value="admin">Admin</option>
          <option value="employee">Mitarbeiter</option>
        </select>
      </div>
      <div id="adminLogin">
        <div class="form-group"><label>Passwort</label>
          <input type="password" id="adminPass" placeholder="Admin-Passwort eingeben">
        </div>
      </div>
      <div id="empLogin" class="hidden">
        <div class="form-group"><label>Mitarbeiter PIN</label>
          <input type="password" id="empPin" placeholder="4-stellige PIN" maxlength="4">
        </div>
      </div>
      <button class="btn primary" id="loginBtn">Anmelden</button>
    </div>
  </div>`;
}

async function handleLogin() {
  const type = document.getElementById('loginType').value;
  try {
    let data;
    if (type === 'admin') {
      const pass = document.getElementById('adminPass').value;
      data = await API.post('/api/login/admin', { password: pass });
    } else {
      const pin = document.getElementById('empPin').value;
      data = await API.post('/api/login/employee', { pin });
    }
    API.setAuth(data.token, { role: data.role, name: data.name, id: data.id });
    state.view = data.role === 'admin' ? 'admin' : 'employee';
    toast('Willkommen, ' + data.name + '!');
    render();
  } catch (e) {
    toast(e.message, true);
  }
}

async function logout() {
  try { await API.post('/api/logout'); } catch(e) {}
  API.clearAuth();
  state.view = 'login';
  render();
}

// ─── ADMIN ───
function renderAdmin() {
  const tabs = { dashboard: renderAdminDashboard, employees: renderAdminEmployees, tasks: renderAdminTasks, deductions: renderAdminDeductions, overview: renderAdminOverview };
  const content = (tabs[state.adminTab] || tabs.dashboard)();
  const modal = state.modal ? renderModal() : '';
  return `<div class="app">
    <div class="topbar">
      <div class="logo"><span></span>TASK SYSTEM</div>
      <div class="user-info">${API.user.name}<div class="role-badge">Admin</div></div>
    </div>
    <div class="main">
      <div class="sidebar"><div class="sidebar-nav">
        <div class="nav-section">Navigation</div>
        ${navItem('dashboard','Dashboard',`<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>`)}
        ${navItem('overview','Gesamtübersicht',`<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>`)}
        ${navItem('employees','Mitarbeiter',`<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>`)}
        ${navItem('tasks','Aufgaben',`<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>`)}
        ${navItem('deductions','Abzüge',`<circle cx="12" cy="12" r="10"/><path d="M8 12h8"/>`)}
        <div class="nav-section" style="margin-top:24px">System</div>
        <div class="nav-item" data-action="logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Abmelden</div>
      </div></div>
      <div class="content">${content}</div>
    </div>
    ${modal}
  </div>`;
}

function navItem(tab, label, iconPath) {
  return `<div class="nav-item ${state.adminTab===tab?'active':''}" data-tab="${tab}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconPath}</svg>${label}
  </div>`;
}

function renderAdminDashboard() {
  const s = state.stats;
  const recent = state.tasks.slice(0, 6);
  return `
    <div class="page-header"><div><div class="page-title">Dashboard</div><div class="page-subtitle">Übersicht aller Aktivitäten</div></div></div>
    <div class="stats-row">
      <div class="stat-card"><div class="label">Mitarbeiter</div><div class="value accent">${s.totalEmployees||0}</div></div>
      <div class="stat-card"><div class="label">Offene Aufgaben</div><div class="value orange">${s.openTasks||0}</div></div>
      <div class="stat-card"><div class="label">Überfällig</div><div class="value red">${s.overdueTasks||0}</div></div>
      <div class="stat-card"><div class="label">Std. Abzüge gesamt</div><div class="value red">-${s.totalDeductions||0}h</div></div>
    </div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Letzte Aufgaben</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Aufgabe</th><th>Mitarbeiter</th><th>Abzug</th><th>Deadline</th><th>Status</th></tr></thead>
      <tbody>${recent.map(t => `<tr>
        <td style="font-weight:500">${esc(t.title)}</td>
        <td>${esc(t.employee_name||'—')}</td>
        <td><span class="task-penalty">-${t.penalty_hours}h</span></td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${t.deadline}</td>
        <td><span class="badge ${t.status}">${statusLabel(t.status)}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function renderAdminEmployees() {
  return `
    <div class="page-header">
      <div><div class="page-title">Mitarbeiter</div><div class="page-subtitle">${state.employees.length} registriert</div></div>
      <button class="btn primary" data-action="addEmployee">+ Mitarbeiter hinzufügen</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Rolle</th><th>PIN</th><th>Soll</th><th>Abzüge</th><th>Effektiv</th><th>Aktionen</th></tr></thead>
      <tbody>${state.employees.map(e => `<tr>
        <td style="font-weight:600">${esc(e.name)}</td>
        <td>${esc(e.role)}</td>
        <td style="font-family:'JetBrains Mono',monospace;color:var(--text-muted)">${e.pin}</td>
        <td style="font-family:'JetBrains Mono',monospace">${e.monthly_hours}h</td>
        <td><span style="font-family:'JetBrains Mono',monospace;color:var(--red);font-weight:600">${e.total_deductions>0?'-'+e.total_deductions+'h':'—'}</span></td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--green)">${e.effective_hours}h</td>
        <td>
          <button class="btn sm" data-action="editEmployee" data-id="${e.id}">Bearbeiten</button>
          <button class="btn sm danger" data-action="deleteEmployee" data-id="${e.id}">Löschen</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function renderAdminTasks() {
  return `
    <div class="page-header">
      <div><div class="page-title">Aufgaben</div><div class="page-subtitle">${state.tasks.length} insgesamt</div></div>
      <button class="btn primary" data-action="addTask">+ Aufgabe erstellen</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Aufgabe</th><th>Mitarbeiter</th><th>Abzug</th><th>Deadline</th><th>Status</th><th>Aktionen</th></tr></thead>
      <tbody>${state.tasks.map(t => `<tr>
        <td style="font-weight:600">${esc(t.title)}</td>
        <td>${esc(t.employee_name||'—')}</td>
        <td><span class="task-penalty">-${t.penalty_hours}h</span></td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${t.deadline}</td>
        <td><span class="badge ${t.status}">${statusLabel(t.status)}</span></td>
        <td>
          ${t.status==='open'?`<button class="btn sm danger" data-action="markOverdue" data-id="${t.id}">Überfällig</button>`:''}
          ${t.status==='overdue'?`<button class="btn sm danger" data-action="applyDeduction" data-id="${t.id}">Abzug buchen</button>`:''}
          <button class="btn sm danger" data-action="deleteTask" data-id="${t.id}">×</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function renderAdminDeductions() {
  return `
    <div class="page-header"><div><div class="page-title">Abzüge</div><div class="page-subtitle">Stundenabzüge für versäumte Aufgaben</div></div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Aufgabe</th><th>Grund</th><th>Abzug</th></tr></thead>
      <tbody>${state.deductions.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px">Keine Abzüge</td></tr>':''}
      ${state.deductions.map(d => `<tr>
        <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${d.date}</td>
        <td style="font-weight:500">${esc(d.employee_name||'—')}</td>
        <td>${esc(d.task_title)}</td>
        <td style="color:var(--text-muted)">${esc(d.reason)}</td>
        <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red);font-size:15px">-${d.hours}h</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

// ─── OVERVIEW: all employees with their tasks ───
function renderAdminOverview() {
  return `
    <div class="page-header"><div><div class="page-title">Gesamtübersicht</div><div class="page-subtitle">Alle Mitarbeiter mit Aufgaben und Abzügen</div></div></div>
    ${state.employees.map(emp => {
      const empTasks = state.tasks.filter(t => t.employee_id === emp.id);
      const empDed = state.deductions.filter(d => d.employee_id === emp.id);
      const totalDed = empDed.reduce((s, d) => s + d.hours, 0);
      const open = empTasks.filter(t => t.status === 'open').length;
      const overdue = empTasks.filter(t => t.status === 'overdue').length;
      const done = empTasks.filter(t => t.status === 'done').length;

      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:17px;font-weight:700">${esc(emp.name)}</div>
            <div style="font-size:12px;color:var(--text-muted)">${esc(emp.role)} · PIN: ${emp.pin}</div>
          </div>
          <div style="display:flex;gap:16px;align-items:center">
            <div style="text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--orange)">${open}</div><div style="font-size:10px;color:var(--text-muted)">Offen</div></div>
            <div style="text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--red)">${overdue}</div><div style="font-size:10px;color:var(--text-muted)">Überfällig</div></div>
            <div style="text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--green)">${done}</div><div style="font-size:10px;color:var(--text-muted)">Erledigt</div></div>
            <div style="border-left:1px solid var(--border);padding-left:16px;text-align:center">
              <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--green)">${emp.effective_hours}h</div>
              <div style="font-size:10px;color:var(--text-muted)">Effektiv${totalDed > 0 ? ' <span style="color:var(--red)">(-'+totalDed+'h)</span>' : ''}</div>
            </div>
          </div>
        </div>
        ${empTasks.length > 0 ? `<table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)">Aufgabe</th>
            <th style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)">Abzug</th>
            <th style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)">Deadline</th>
            <th style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)">Status</th>
          </tr></thead>
          <tbody>${empTasks.map(t => `<tr>
            <td style="padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(42,42,58,.3);font-weight:500">${esc(t.title)}</td>
            <td style="padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(42,42,58,.3)"><span class="task-penalty">-${t.penalty_hours}h</span></td>
            <td style="padding:8px 10px;font-size:12px;border-bottom:1px solid rgba(42,42,58,.3);font-family:'JetBrains Mono',monospace">${t.deadline}</td>
            <td style="padding:8px 10px;border-bottom:1px solid rgba(42,42,58,.3)"><span class="badge ${t.status}">${statusLabel(t.status)}</span></td>
          </tr>`).join('')}</tbody>
        </table>` : '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Aufgaben</div>'}
      </div>`;
    }).join('')}
    ${state.employees.length === 0 ? '<div style="text-align:center;color:var(--text-muted);padding:48px">Keine Mitarbeiter vorhanden</div>' : ''}`;
}

// ─── EMPLOYEE VIEW ───
function renderEmployee() {
  const s = state.myStats;
  const open = state.tasks.filter(t => t.status === 'open');
  const overdue = state.tasks.filter(t => t.status === 'overdue');
  const done = state.tasks.filter(t => t.status === 'done');
  return `<div class="app">
    <div class="topbar">
      <div class="logo"><span></span>TASK SYSTEM</div>
      <div class="user-info">${API.user.name}<div class="role-badge">Mitarbeiter</div></div>
    </div>
    <div class="content" style="max-width:800px;margin:0 auto;padding:32px 24px;height:calc(100vh - 52px);overflow-y:auto">
      <div class="page-header">
        <div>
          <div class="page-title">Hallo, ${esc(s.name||API.user.name)}!</div>
          <div class="page-subtitle">${esc(s.role||'')} · ${s.effective_hours||0}h effektiv${s.total_deductions>0?` (${s.total_deductions}h Abzüge)`:''}</div>
        </div>
        <button class="btn" data-action="logout">Abmelden</button>
      </div>
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="label">Offen</div><div class="value orange">${s.openTasks||0}</div></div>
        <div class="stat-card"><div class="label">Erledigt</div><div class="value green">${s.doneTasks||0}</div></div>
        <div class="stat-card"><div class="label">Abzüge</div><div class="value red">${s.total_deductions>0?'-'+s.total_deductions+'h':'0'}</div></div>
      </div>
      ${open.length>0?`<div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--orange)">⚡ Offene Aufgaben</div>${open.map(t=>taskCard(t)).join('')}`:''}
      ${overdue.length>0?`<div style="font-size:14px;font-weight:600;margin:20px 0 12px;color:var(--red)">⚠ Überfällig</div>${overdue.map(t=>taskCard(t,false,true)).join('')}`:''}
      ${done.length>0?`<div style="font-size:14px;font-weight:600;margin:20px 0 12px;color:var(--green)">✓ Erledigt</div>${done.map(t=>taskCard(t,true)).join('')}`:''}
      ${state.tasks.length===0?'<div style="text-align:center;color:var(--text-muted);padding:48px">Keine Aufgaben</div>':''}
    </div>
  </div>`;
}

function taskCard(t, completed, isOverdue) {
  return `<div class="task-card ${completed?'completed':''}">
    <div class="task-check ${completed?'checked':''}" ${completed?'':`data-action="completeTask" data-id="${t.id}"`}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
    </div>
    <div class="task-info">
      <div class="task-title">${esc(t.title)}</div>
      <div style="font-size:12px;color:var(--text-muted);margin:4px 0">${esc(t.description||'')}</div>
      <div class="task-meta">
        <span>Deadline: ${t.deadline}</span>
        <span class="task-penalty">Abzug: -${t.penalty_hours}h</span>
        ${isOverdue?'<span class="badge overdue">Überfällig!</span>':''}
      </div>
    </div>
  </div>`;
}

// ─── MODAL ───
function renderModal() {
  const m = state.modal;
  let content = '';
  if (m.type === 'addEmployee' || m.type === 'editEmployee') {
    const e = m.data || {};
    content = `<h3>${m.data?'Mitarbeiter bearbeiten':'Neuer Mitarbeiter'}</h3>
      <div class="form-group"><label>Name</label><input id="mName" value="${esc(e.name||'')}" placeholder="Vor- und Nachname"></div>
      <div class="form-group"><label>Rolle</label><input id="mRole" value="${esc(e.role||'')}" placeholder="z.B. Reinigung"></div>
      <div class="form-group"><label>PIN (4 Stellen)</label><input id="mPin" value="${e.pin||''}" maxlength="4" placeholder="1234"></div>
      <div class="form-group"><label>Sollstunden/Monat</label><input type="number" id="mHours" value="${e.monthly_hours||160}"></div>
      <div class="form-actions">
        <button class="btn" data-action="closeModal">Abbrechen</button>
        <button class="btn primary" data-action="saveEmployee" data-id="${e.id||''}">${m.data?'Speichern':'Hinzufügen'}</button>
      </div>`;
  }
  if (m.type === 'addTask') {
    content = `<h3>Neue Aufgabe</h3>
      <div class="form-group"><label>Titel</label><input id="mTitle" placeholder="z.B. Büro aufräumen"></div>
      <div class="form-group"><label>Beschreibung</label><textarea id="mDesc" placeholder="Details..."></textarea></div>
      <div class="form-group"><label>Mitarbeiter</label><select id="mEmp">${state.employees.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('')}</select></div>
      <div class="form-group"><label>Stundenabzug</label><input type="number" id="mPenalty" value="2" step="0.5" min="0.5"></div>
      <div class="form-group"><label>Deadline</label><input type="date" id="mDeadline" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-actions">
        <button class="btn" data-action="closeModal">Abbrechen</button>
        <button class="btn primary" data-action="saveTask">Aufgabe erstellen</button>
      </div>`;
  }
  return `<div class="modal-overlay show" data-action="closeModalBg"><div class="modal">${content}</div></div>`;
}

// ─── HELPERS ───
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function statusLabel(s) { return {open:'Offen',done:'Erledigt',overdue:'Überfällig',deducted:'Abgezogen'}[s]||s; }

// ─── EVENT DELEGATION ───
function bindEvents() {
  document.getElementById('app').addEventListener('click', async (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;

    if (action === 'logout') return logout();
    if (action === 'closeModal' || action === 'closeModalBg') {
      if (action === 'closeModalBg' && e.target !== el) return;
      state.modal = null; render(); return;
    }

    // Nav tabs
    const tab = el.dataset.tab;
    if (tab) { state.adminTab = tab; render(); return; }

    // Employee actions
    if (action === 'addEmployee') { state.modal = { type: 'addEmployee' }; render(); return; }
    if (action === 'editEmployee') {
      const emp = state.employees.find(e => e.id == id);
      state.modal = { type: 'editEmployee', data: emp }; render(); return;
    }
    if (action === 'saveEmployee') {
      const name = document.getElementById('mName').value.trim();
      const role = document.getElementById('mRole').value.trim();
      const pin = document.getElementById('mPin').value.trim();
      const hours = parseFloat(document.getElementById('mHours').value) || 160;
      if (!name || !pin) { toast('Name und PIN sind Pflicht!', true); return; }
      try {
        if (id) await API.put('/api/employees/' + id, { name, role, pin, monthly_hours: hours });
        else await API.post('/api/employees', { name, role, pin, monthly_hours: hours });
        state.modal = null;
        toast(id ? 'Gespeichert!' : 'Mitarbeiter hinzugefügt!');
        render();
      } catch (e) { toast(e.message, true); }
      return;
    }
    if (action === 'deleteEmployee') {
      if (!confirm('Mitarbeiter wirklich löschen?')) return;
      try { await API.del('/api/employees/' + id); toast('Gelöscht'); render(); } catch(e) { toast(e.message, true); }
      return;
    }

    // Task actions
    if (action === 'addTask') { state.modal = { type: 'addTask' }; render(); return; }
    if (action === 'saveTask') {
      const title = document.getElementById('mTitle').value.trim();
      const desc = document.getElementById('mDesc').value.trim();
      const emp = document.getElementById('mEmp').value;
      const penalty = parseFloat(document.getElementById('mPenalty').value) || 2;
      const deadline = document.getElementById('mDeadline').value;
      if (!title) { toast('Titel ist Pflicht!', true); return; }
      try {
        await API.post('/api/tasks', { employee_id: parseInt(emp), title, description: desc, penalty_hours: penalty, deadline });
        state.modal = null; toast('Aufgabe erstellt!'); render();
      } catch(e) { toast(e.message, true); }
      return;
    }
    if (action === 'deleteTask') {
      try { await API.del('/api/tasks/' + id); toast('Gelöscht'); render(); } catch(e) { toast(e.message, true); }
      return;
    }
    if (action === 'markOverdue') {
      try { await API.put('/api/tasks/' + id + '/status', { status: 'overdue' }); toast('Als überfällig markiert'); render(); } catch(e) { toast(e.message, true); }
      return;
    }
    if (action === 'applyDeduction') {
      el.disabled = true; el.textContent = '...';
      try { await API.post('/api/deductions', { task_id: parseInt(id) }); toast('Abzug gebucht!'); render(); } catch(e) { toast(e.message, true); render(); }
      return;
    }
    if (action === 'completeTask') {
      try { await API.put('/api/tasks/' + id + '/status', { status: 'done' }); toast('Erledigt! ✓'); render(); } catch(e) { toast(e.message, true); }
      return;
    }
  });

  // Nav items via data-tab
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.adminTab = el.dataset.tab; render(); });
  });

  // Login type toggle
  const lt = document.getElementById('loginType');
  if (lt) lt.addEventListener('change', () => {
    document.getElementById('adminLogin').classList.toggle('hidden', lt.value !== 'admin');
    document.getElementById('empLogin').classList.toggle('hidden', lt.value !== 'employee');
  });

  // Login button
  const lb = document.getElementById('loginBtn');
  if (lb) lb.addEventListener('click', handleLogin);

  // Enter key login
  ['adminPass', 'empPin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  });
}

// ─── INIT ───
render();
</script>
</body>
</html>
